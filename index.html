<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Love Message</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #111, #000);
      font-family: Arial, sans-serif;
      color: white;
    }

    .box {
      width: 320px;
      padding: 25px;
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(255, 0, 60, 0.2);
      z-index: 2;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 8px;
      margin-top: 10px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #ff2d55;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4d6d;
    }

    /* floating hearts */
    .heart {
      position: absolute;
      color: rgba(255, 60, 100, 0.6);
      font-size: 18px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(100vh) scale(1); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="box">
    <h2 id="question">Do you love me?</h2>
    <input id="answer" type="text" placeholder="Type yes or no...">
    <button onclick="checkAnswer()">Submit</button>
  </div>

  <script>
    let step = 1;

    function checkAnswer() {
      const input = document.getElementById("answer").value.toLowerCase();

      if (step === 1) {
        if (input === "yes") {
          document.getElementById("question").innerText = "Are you happy with me?";
        } else {
          document.getElementById("question").innerText = "Why not? I love u with all my life 💔";
        }
        step = 2;
      } 
      else if (step === 2) {
        document.getElementById("question").innerText =
          "Happy 2 month anniversary Baby (Cho) ❤️";

        document.getElementById("answer").style.display = "none";
        document.querySelector("button").style.display = "none";
      }

      document.getElementById("answer").value = "";
    }

    // floating hearts generator
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "❤";

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.fontSize = (10 + Math.random() * 20) + "px";
      heart.style.animationDuration = (4 + Math.random() * 4) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 7000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
